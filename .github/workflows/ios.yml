name: Build iOS .ipa (armv6, iPhone OS 2.0)

# Cross-compiles Butterscotch for iPod Touch 2G with Theos + clang on
# ubuntu-latest. No Xcode / no Mac runner required.

on:
  push:
    branches: [main, "devin/**"]
    paths:
      - "src/**"
      - "vendor/**"
      - ".github/workflows/ios.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "vendor/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch: {}

jobs:
  build-ios-armv6:
    name: Build (Theos / iOS 2.0 / armv6)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Identify commit
        id: commit-info
        run: |
          echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(git log -1 --format=%cd --date=short)" >> $GITHUB_OUTPUT

      - name: Install host build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release software-properties-common \
                                  build-essential perl curl ca-certificates \
                                  zip unzip xz-utils bzip2 git fakeroot make

      - name: Install Theos + iOS cross toolchain
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          git clone --recursive https://github.com/theos/theos.git "$THEOS"
          # Theos expects the iOS cross compiler at
          # $THEOS/toolchain/linux/iphone/bin/clang. We grab the
          # sbingner llvm-project Linux→iOS toolchain release (the
          # currently recommended option from the Theos issue tracker;
          # bundles clang, ld64, cctools, libtapi, etc., and supports
          # the legacy armv6 ABI we need for iPod Touch 2G).
          mkdir -p "$THEOS/toolchain/linux/iphone"
          curl -fsSL \
            "https://github.com/L1ghtmann/llvm-project/releases/download/main-update_3-eabca92/iOSToolchain-x86_64.tar.xz" \
            -o /tmp/ios-toolchain.tar.xz
          tar -xf /tmp/ios-toolchain.tar.xz -C "$THEOS/toolchain"
          ls "$THEOS/toolchain/linux/iphone/bin" | head -20
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Install iPhoneOS 3.1.3 SDK
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          mkdir -p "$THEOS/sdks"
          # Sn0wCooder/theos-sdks is a community mirror that keeps the
          # legacy 3.x SDKs alive (the official theos/sdks repo dropped
          # anything older than iOS 9.3).
          curl -fsSL -o /tmp/iphoneos3.1.3.sdk.tbz2 \
            "https://raw.githubusercontent.com/Sn0wCooder/theos-sdks/master/iPhoneOS3.1.3.sdk.tbz2"
          tar -xjf /tmp/iphoneos3.1.3.sdk.tbz2 -C "$THEOS/sdks"
          ls "$THEOS/sdks"

      - name: Build .deb + .app via Theos
        env:
          THEOS: ${{ github.workspace }}/theos
          FINALPACKAGE: "1"
        working-directory: src/gles/ios
        run: |
          # $CC / $CXX were exported into $GITHUB_ENV by the install step.
          echo "Using CC=$CC CXX=$CXX"
          make clean
          make package FINALPACKAGE=1
          ls -la packages

      - name: Pack .ipa from staged .app
        working-directory: src/gles/ios
        run: |
          rm -rf ipa_build
          mkdir -p ipa_build/Payload
          # The .app lands under .theos/obj/Butterscotch.app when armv6 is
          # the only arch.
          APP_DIR=".theos/obj/Butterscotch.app"
          if [ ! -d "$APP_DIR" ]; then
            APP_DIR=".theos/obj/armv6/Butterscotch.app"
          fi
          cp -a "$APP_DIR" ipa_build/Payload/
          (cd ipa_build && zip -rq ../packages/Butterscotch-${{ steps.commit-info.outputs.hash }}-armv6-iOS3.1.3.ipa Payload)
          ls -la packages

      - name: Upload .ipa + .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Butterscotch-armv6-iOS3.1.3-${{ steps.commit-info.outputs.hash }}
          path: |
            src/gles/ios/packages/*.ipa
            src/gles/ios/packages/*.deb
          if-no-files-found: error
          retention-days: 30
