name: Build iOS .ipa (armv6, iPhone OS 3.1.3)

# Cross-compiles Butterscotch for iPod Touch 2G with Theos + clang on
# ubuntu-latest. No Xcode / no Mac runner required.

on:
  push:
    branches: [main, "devin/**"]
    paths:
      - "src/**"
      - "vendor/**"
      - ".github/workflows/ios.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "vendor/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch: {}

jobs:
  build-ios-armv6:
    name: Build (Theos / iOS 3.1.3 / armv6)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Identify commit
        id: commit-info
        run: |
          echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(git log -1 --format=%cd --date=short)" >> $GITHUB_OUTPUT

      - name: Install clang + helper tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release software-properties-common \
                                  build-essential perl curl ca-certificates \
                                  zip unzip xz-utils bzip2 git
          # Use the official llvm.sh installer; it auto-picks the
          # correct apt.llvm.org channel for this Ubuntu codename. We
          # request the latest LLVM 22 packages (matches the local dev
          # toolchain), but the workflow works with any clang >= 18.
          curl -fsSL https://apt.llvm.org/llvm.sh -o /tmp/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 22 || sudo /tmp/llvm.sh 21 || sudo /tmp/llvm.sh 20 || sudo /tmp/llvm.sh 19 || sudo /tmp/llvm.sh 18
          # Find whichever clang version was installed and expose it
          # under stable names.
          for v in 22 21 20 19 18; do
            if command -v "clang-$v" >/dev/null; then
              echo "CLANG=/usr/bin/clang-$v"  >> "$GITHUB_ENV"
              echo "CLANGPP=/usr/bin/clang++-$v" >> "$GITHUB_ENV"
              echo "CC=/usr/bin/clang-$v"  >> "$GITHUB_ENV"
              echo "CXX=/usr/bin/clang++-$v" >> "$GITHUB_ENV"
              sudo ln -sf "/usr/bin/clang-$v" /usr/local/bin/clang
              sudo ln -sf "/usr/bin/clang++-$v" /usr/local/bin/clang++
              "/usr/bin/clang-$v" --version
              break
            fi
          done

      - name: Install ldid (fake codesigner)
        run: |
          sudo apt-get install -y ldid || {
            # Build from source if no apt package is available.
            git clone --depth 1 https://github.com/ProcursusTeam/ldid.git /tmp/ldid
            (cd /tmp/ldid && make -j$(nproc) && sudo install -m 755 ldid /usr/local/bin/ldid)
          }
          ldid -V || true

      - name: Install Theos
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          # Non-interactive install: pre-answer "n" to the Swift question
          # so we get a smaller toolchain (Butterscotch is C + ObjC, no Swift).
          git clone --recursive https://github.com/theos/theos.git "$THEOS"
          # Theos ships its own internal toolchain bootstrapper; we provide
          # clang via $CC / $CXX so it does not try to download macOS-only
          # binaries. The build system invokes the cross-compiler directly.
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Install iPhoneOS 3.1.3 SDK
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          mkdir -p "$THEOS/sdks"
          # Sn0wCooder/theos-sdks is a community mirror that keeps the
          # legacy 3.x SDKs alive (the official theos/sdks repo dropped
          # anything older than iOS 9.3).
          curl -fsSL -o /tmp/iphoneos3.1.3.sdk.tbz2 \
            "https://raw.githubusercontent.com/Sn0wCooder/theos-sdks/master/iPhoneOS3.1.3.sdk.tbz2"
          tar -xjf /tmp/iphoneos3.1.3.sdk.tbz2 -C "$THEOS/sdks"
          ls "$THEOS/sdks"

      - name: Build .deb + .app via Theos
        env:
          THEOS: ${{ github.workspace }}/theos
          FINALPACKAGE: "1"
        working-directory: src/gles/ios
        run: |
          # $CC / $CXX were exported into $GITHUB_ENV by the install step.
          echo "Using CC=$CC CXX=$CXX"
          make clean
          make package FINALPACKAGE=1
          ls -la packages

      - name: Pack .ipa from staged .app
        working-directory: src/gles/ios
        run: |
          rm -rf ipa_build
          mkdir -p ipa_build/Payload
          # The .app lands under .theos/obj/Butterscotch.app when armv6 is
          # the only arch.
          APP_DIR=".theos/obj/Butterscotch.app"
          if [ ! -d "$APP_DIR" ]; then
            APP_DIR=".theos/obj/armv6/Butterscotch.app"
          fi
          cp -a "$APP_DIR" ipa_build/Payload/
          (cd ipa_build && zip -rq ../packages/Butterscotch-${{ steps.commit-info.outputs.hash }}-armv6-iOS3.1.3.ipa Payload)
          ls -la packages

      - name: Upload .ipa + .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Butterscotch-armv6-iOS3.1.3-${{ steps.commit-info.outputs.hash }}
          path: |
            src/gles/ios/packages/*.ipa
            src/gles/ios/packages/*.deb
          if-no-files-found: error
          retention-days: 30
